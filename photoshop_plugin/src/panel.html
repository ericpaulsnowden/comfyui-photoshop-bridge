<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="panel.css" />
  </head>
  <body>
    <div class="cpsb-panel">
      <div class="cpsb-status-pill">
        <span id="cpsb-status-dot" class="cpsb-dot cpsb-dot-disconnected"></span>
        <span id="cpsb-status-text" class="cpsb-status-text">Disconnected</span>
      </div>
      <div id="cpsb-server-url" class="cpsb-muted cpsb-conn-line"></div>
      <div id="cpsb-last-error" class="cpsb-error-line cpsb-conn-line"></div>
      <div id="cpsb-retry-line" class="cpsb-muted cpsb-conn-line"></div>

      <div class="cpsb-rule"></div>

      <!-- Headings are written in uppercase directly: text-transform is not
           in UXP's documented CSS property set. -->
      <div class="cpsb-section-title">ACTIVE HANDOFFS</div>
      <div id="cpsb-handoff-list">
        <div class="cpsb-empty">No documents from ComfyUI are currently open.</div>
      </div>

      <div class="cpsb-rule"></div>

      <!-- Plain div + JS click toggle: <details>/<summary> are unsupported
           in UXP (treated as bare divs, so the disclosure never collapses),
           and the `hidden` attribute is documented as unsupported too. -->
      <div id="cpsb-advanced-toggle" class="cpsb-advanced-toggle">
        <span id="cpsb-advanced-caret" class="cpsb-caret">&#9656;</span>
        <span class="cpsb-section-title">ADVANCED</span>
      </div>
      <pre id="cpsb-log" class="cpsb-log cpsb-collapsed"></pre>
    </div>
    <script src="index.js"></script>
  </body>
</html>
